<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Majestic Fuel Analysis Report</title>
    <style>
        body {
            font-family: 'Helvetica', sans-serif;
            padding: 40px;
            color: #333;
        }

        .header {
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .item {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .label {
            font-weight: bold;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
        }

        .val {
            font-size: 1.2rem;
            margin-top: 5px;
        }

        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>MAJESTIC FUEL ANALYSIS REPORT</h1>
        <p>Strategic Quantitative Analysis | Generated on {{ timestamp }}</p>
    </div>

    <div class="grid">
        {% for key, val in results.items() %}
        <div class="item">
            <div class="label">{{ key.replace('_', ' ') }}</div>
            <div class="val">{{ val }}</div>
        </div>
        {% endfor %}
    </div>

    <div style="margin-top: 50px; text-align: center;" class="no-print">
        <button onclick="window.print()" style="padding: 10px 20px; cursor: pointer;">Print Official Report</button>
        <a href="/" style="margin-left: 20px;">Return to Terminal</a>
    </div>
</body>

</html>
